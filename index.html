<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Vídeo (fundo com tudo desenhado) -->
  <video id="bgVideo" class="bg-video" autoplay loop muted playsinline preload="auto">
    <source src="Noan_1.mp4" type="video/mp4" />
  </video>

  <!-- HOTSPOTS (camada clicável por cima do vídeo) -->
  <div class="hotspots">
    <!-- PLAY (toca musica.mp3) -->
    <button class="hotspot play" id="playMusic" aria-label="Tocar música"></button>

    <!-- LOCAL -->
    <a class="hotspot local"
       href="https://www.instagram.com/tatubolafortaleza?igsh=OG5pY21leHZ3Zzhz"
       target="_blank" rel="noopener"
       aria-label="Abrir local"></a>

    <!-- CONFIRMAR -->
    <a class="hotspot confirm"
       href="https://wa.me/5585996660017?text=Me%20confirma%20a%C3%AD%20macho%20v%C3%A9i"
       target="_blank" rel="noopener"
       aria-label="Confirmar presença"></a>
  </div>

  <!-- Áudio -->
  <audio id="music" preload="auto">
    <source src="musica.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
