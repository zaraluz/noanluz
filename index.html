<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Vídeo de fundo tela toda -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="assets/bg.mp4" type="video/mp4" />
  </video>

  <!-- Camada do conteúdo (imagens + hotspots) -->
  <main class="wrap">

    <!-- PARTE 1 (tela cheia) -->
    <section class="screen hero">
      <img class="layout" src="assets/capa.png" alt="Convite - capa" />

      <!-- Clique no envelope (faz rolar) -->
      <button class="hotspot envelope" id="openInvite" aria-label="Abrir convite"></button>

      <!-- Botão play (toca música/áudio) -->
      <button class="hotspot play" id="playMusic" aria-label="Tocar música"></button>
    </section>

    <!-- PARTE 2 (rolável) -->
    <section class="screen content" id="details">
      <img class="layout" src="assets/conteudo.png" alt="Convite - detalhes" />

      <!-- LOCAL (cobrindo a bola toda) -->
      <a class="hotspot local"
         href="https://www.instagram.com/tatubolafortaleza?igsh=OG5pY21leHZ3Zzhz"
         target="_blank" rel="noopener"
         aria-label="Abrir local no Instagram"></a>

      <!-- CONFIRMAR -->
      <a class="hotspot confirm"
         href="https://SEU-LINK-AQUI"
         target="_blank" rel="noopener"
         aria-label="Confirmar presença"></a>
    </section>

  </main>

  <!-- Áudio (toca no clique) -->
  <audio id="music" preload="auto">
    <source src="assets/musica.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
