<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TELA 1 -->
  <section class="screen" id="part1">
    <img class="bg" src="Noan_1.png" alt="Convite - capa" />

    <!-- GIF por cima (sem fundo) -->
    <img class="gif gif1" src="Noan_1_g.gif" alt="" />

    <!-- Clique no envelope/cabeça para abrir (ir para tela 2) -->
    <button class="hotspot open" id="openInvite" aria-label="Abrir convite"></button>
  </section>

  <!-- TELA 2 -->
  <section class="screen" id="part2">
    <img class="bg" src="Noan_2.png" alt="Convite - detalhes" />

    <!-- GIF por cima (sem fundo) -->
    <img class="gif gif2" src="Noan_2_g.gif" alt="" />

    <!-- Botão música -->
    <button class="hotspot play" id="playMusic" aria-label="Tocar música"></button>

    <!-- Local -->
    <a class="hotspot local"
       href="https://www.instagram.com/tatubolafortaleza?igsh=OG5pY21leHZ3Zzhz"
       rel="noopener noreferrer"
       aria-label="Abrir local"></a>

    <!-- Confirmar -->
    <a class="hotspot confirm"
       href="https://wa.me/5585996660017?text=Me%20confirma%20a%C3%AD%20macho%20v%C3%A9i"
       rel="noopener noreferrer"
       aria-label="Confirmar presença"></a>
  </section>

  <!-- Música -->
  <audio id="music" preload="auto">
    <source src="musica.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
